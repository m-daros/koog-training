spring:
  application:
    name: koog-training

app:
  llm:
#    Supported providers: ollama, openai, google, anthropic, openrouter, mistral, groq.
#    base-url is optional for provider defaults.
#    Default API key env vars: OPENAI_API_KEY, GEMINI_API_KEY, ANTHROPIC_API_KEY, OPENROUTER_API_KEY, MISTRAL_API_KEY, GROQ_API_KEY.
#    provider: ollama
#    model: qwen3:4b
#    base-url: http://localhost:11434

    # Use the exact Groq model id (see https://console.groq.com/docs/models).
    # llama-3.3-70b-versatile: may emit text-style <function=...> for structured subgraph output.
    # openai/gpt-oss-120b: often better tool calling; id must include the openai/ prefix.
    provider: groq
    model: openai/gpt-oss-120b
    # QA test-plan finalize calls need room for tool JSON (up to ~5k chars) plus model overhead.
    max-output-tokens: 4096
    base-url: https://api.groq.com
    api-key: ${GROQ_API_KEY}

    retry:
      enabled: true
      max-attempts: 3
      initial-delay-millis: 1000
      max-delay-millis: 20000
      backoff-multiplier: 2.0
      jitter-factor: 0.2

    datasource-config:
      username: koog-training-user
      # Default matches the local koog-postgres Helm release; override via KOOG_TRAINING_DB_PASSWORD.
      password: ${KOOG_TRAINING_DB_PASSWORD:koog-training-password}
      url: jdbc:postgresql://localhost:5432/koog
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000